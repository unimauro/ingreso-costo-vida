<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9f5ec"/>
      <stop offset="1" stop-color="#f1e7d3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- franja textil andina superior e inferior -->
  <g id="band">
    <g id="unit">
      <rect x="0"  width="14" height="16" fill="#d5182f"/>
      <rect x="14" width="8"  height="16" fill="#cf8a1e"/>
      <rect x="26" width="14" height="16" fill="#0f8a86"/>
      <rect x="40" width="6"  height="16" fill="#a2541f"/>
    </g>
  </g>
  <g>
    <!-- repetición manual de la franja -->
    <rect x="0" y="0"   width="1200" height="16" fill="#f1e7d3"/>
    <rect x="0" y="614" width="1200" height="16" fill="#f1e7d3"/>
  </g>
  <g fill="none">
    <!-- barras textiles arriba -->
    <g>
      <rect x="0"  y="0" width="1200" height="16" fill="#d5182f"/>
    </g>
  </g>
  <!-- franja de colores (arriba) -->
  <g>
    <rect x="0"    y="0" width="1200" height="10" fill="#d5182f"/>
    <rect x="0"    y="0" width="1200" height="10" fill="#d5182f"/>
  </g>

  <!-- chakana -->
  <g transform="translate(64,140) scale(1.5)">
    <path fill="#d5182f" d="M40 0h20v20h20v20h20v20H80v20H60v20H40V80H20V60H0V40h20V20h20z"/>
    <rect x="42" y="42" width="16" height="16" fill="#f9f5ec"/>
  </g>

  <!-- eyebrow -->
  <rect x="260" y="128" width="40" height="3" fill="#d5182f"/>
  <text x="312" y="138" font-family="'Instrument Sans', Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#d5182f">INEI · ENAHO · CENSO 2025</text>

  <!-- título -->
  <text x="260" y="230" font-family="'Fraunces', Georgia, serif" font-size="66" font-weight="600" fill="#2b2015">¿Alcanza el ingreso</text>
  <text x="260" y="304" font-family="'Fraunces', Georgia, serif" font-size="66" font-weight="600"><tspan fill="#d5182f" font-style="italic">para vivir en el Perú</tspan><tspan fill="#2b2015">?</tspan></text>

  <!-- stat cards -->
  <g font-family="'Instrument Sans', Arial, sans-serif">
    <rect x="64"  y="400" width="256" height="150" rx="18" fill="#ffffff" stroke="#e5dcc8"/>
    <rect x="64"  y="400" width="256" height="5"  rx="3" fill="#0f8a86"/>
    <text x="88"  y="446" font-size="16" font-weight="600" fill="#8c7e6b">Ingreso promedio 2025</text>
    <text x="88"  y="506" font-family="'Fraunces', Georgia, serif" font-size="46" font-weight="600" fill="#2b2015"><tspan font-size="22" fill="#8c7e6b">S/ </tspan>1 887</text>

    <rect x="336" y="400" width="256" height="150" rx="18" fill="#ffffff" stroke="#e5dcc8"/>
    <rect x="336" y="400" width="256" height="5"  rx="3" fill="#cf8a1e"/>
    <text x="360" y="446" font-size="16" font-weight="600" fill="#8c7e6b">Canasta familiar (4)</text>
    <text x="360" y="506" font-family="'Fraunces', Georgia, serif" font-size="46" font-weight="600" fill="#2b2015"><tspan font-size="22" fill="#8c7e6b">S/ </tspan>1 848</text>

    <rect x="608" y="400" width="238" height="150" rx="18" fill="#ffffff" stroke="#e5dcc8"/>
    <rect x="608" y="400" width="238" height="5"  rx="3" fill="#d5182f"/>
    <text x="632" y="446" font-size="16" font-weight="600" fill="#8c7e6b">Pobreza 2025</text>
    <text x="632" y="506" font-family="'Fraunces', Georgia, serif" font-size="46" font-weight="600" fill="#2b2015">25,7<tspan font-size="22" fill="#8c7e6b">%</tspan></text>

    <rect x="862" y="400" width="274" height="150" rx="18" fill="#ffffff" stroke="#e5dcc8"/>
    <rect x="862" y="400" width="274" height="5"  rx="3" fill="#0f8a86"/>
    <text x="886" y="446" font-size="16" font-weight="600" fill="#8c7e6b">Población · Censo</text>
    <text x="886" y="506" font-family="'Fraunces', Georgia, serif" font-size="46" font-weight="600" fill="#2b2015">34,2<tspan font-size="22" fill="#8c7e6b">M</tspan></text>
  </g>

  <!-- foot badge -->
  <rect x="64" y="576" width="240" height="34" rx="9" fill="#0f8a86"/>
  <text x="184" y="599" font-family="'Instrument Sans', Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff" text-anchor="middle">GÁNALE A LA POBREZA</text>
  <text x="320" y="599" font-family="'Instrument Sans', Arial, sans-serif" font-size="18" fill="#5e5142">Calculadora, mapa de regiones, medallas y bot Inti · datos del INEI</text>

  <!-- franjas textiles arriba y abajo (encima de todo) -->
  <g>
    <!-- top stripes -->
    <g id="topband"></g>
  </g>
</svg>
