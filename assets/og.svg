<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2b24"/>
      <stop offset="0.55" stop-color="#12433a"/>
      <stop offset="1" stop-color="#0f7a63"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#54c4a4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#54c4a4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- eyebrow -->
  <rect x="64" y="80" width="46" height="3" fill="#7fe0c6"/>
  <text x="124" y="90" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#7fe0c6">INEI · ENAHO · CENSO 2025</text>

  <!-- title -->
  <text x="62" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#eef4f1">¿Alcanza el ingreso para</text>
  <text x="62" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700"><tspan fill="#7fe0c6">vivir en el Perú</tspan><tspan fill="#eef4f1">?</tspan></text>

  <!-- stat cards -->
  <g font-family="Arial, sans-serif">
    <!-- card 1 -->
    <rect x="64"  y="410" width="256" height="140" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="88"  y="452" font-size="16" font-weight="600" fill="#a9d8ca">Ingreso promedio 2025</text>
    <text x="88"  y="512" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#eef4f1"><tspan font-size="22" fill="#a9d8ca">S/ </tspan>1 887</text>
    <!-- card 2 -->
    <rect x="336" y="410" width="256" height="140" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="360" y="452" font-size="16" font-weight="600" fill="#a9d8ca">Canasta familiar (4)</text>
    <text x="360" y="512" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#eef4f1"><tspan font-size="22" fill="#a9d8ca">S/ </tspan>1 848</text>
    <!-- card 3 -->
    <rect x="608" y="410" width="238" height="140" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="632" y="452" font-size="16" font-weight="600" fill="#a9d8ca">Pobreza 2025</text>
    <text x="632" y="512" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#eef4f1">25,7<tspan font-size="22" fill="#a9d8ca">%</tspan></text>
    <!-- card 4 -->
    <rect x="862" y="410" width="274" height="140" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="886" y="452" font-size="16" font-weight="600" fill="#a9d8ca">Población · Censo</text>
    <text x="886" y="512" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#eef4f1">34,2<tspan font-size="22" fill="#a9d8ca">M</tspan></text>
  </g>

  <!-- foot -->
  <rect x="64" y="578" width="118" height="34" rx="9" fill="#7fe0c6"/>
  <text x="123" y="601" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#0d2b24" text-anchor="middle">DASHBOARD</text>
  <text x="198" y="601" font-family="Arial, sans-serif" font-size="19" fill="#bfe3d7">Ingreso, costo de vida, mapa de regiones y bot Inti · datos oficiales del INEI</text>
</svg>
